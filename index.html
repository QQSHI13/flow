<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Time & Flow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; width: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #111213; touch-action: manipulation; }
        #app { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; }
        
        /* Content */
        #content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; }
        
        /* Header with status and clock widget on top left - stacked vertically */
        #header {
            position: absolute;
            top: 24px;
            left: 24px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
            z-index: 10;
        }
        
        /* Status Badge */
        #badge { 
            display: flex;
            align-items: center;
            justify-content: center;
            height: 44px;
            padding: 0 16px; 
            border-radius: 22px; 
            font-size: 12px; 
            font-weight: 500; 
            color: rgba(255,255,255,0.9); 
            text-transform: uppercase; 
            letter-spacing: 0.1em; 
            background: rgba(59,130,246,0.3);
            white-space: nowrap;
            flex-shrink: 0;
            box-sizing: border-box;
        }
        
        /* Minimalist Clock */
        #clock {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 44px;
            padding: 0 16px;
            border-radius: 22px;
            font-size: 18px;
            font-weight: 400;
            color: rgba(255,255,255,0.9);
            font-family: Arial, Helvetica, sans-serif;
            letter-spacing: 1px;
            background: rgba(96, 96, 96, 0.36);
            border: 1px solid rgba(105, 105, 105, 0.38);
            box-shadow: 7px 7px 11px 0 rgba(0, 0, 0, 0.46);
            text-shadow: 5px 5px 11px rgba(0, 0, 0, 0.64);
            transition: all 300ms cubic-bezier(0.42, 0, 0.58, 1);
            flex-shrink: 0;
            box-sizing: border-box;
        }
        
        /* Clock row with settings button */
        #clock-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        #settings-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 22px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            transition: all 0.15s ease-out;
        }
        
        #settings-btn:hover {
            background: rgba(255,255,255,0.15);
        }
        
        #settings-btn:active {
            transform: scale(0.92);
        }
        
        @media (max-width: 768px) {
            #header {
                top: 16px;
                left: 16px;
                gap: 6px;
            }
            
            #settings-btn {
                width: 36px;
                height: 36px;
                border-radius: 18px;
            }
            
            #badge {
                font-size: 11px;
                height: 36px;
                padding: 0 12px;
                border-radius: 18px;
            }
            
            #clock { 
                font-size: 16px; 
                height: 36px;
                padding: 0 14px;
                border-radius: 18px;
            }
        }
        #ring { position: relative; width: 220px; height: 220px; margin-bottom: 24px; }
        #ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
        #progress {
            transition: stroke-dashoffset 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #timer-text { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #timer-time { 
            font-size: 52px; 
            font-weight: 300; 
            color: #fff; 
            font-family: ui-monospace, SFMono-Regular, monospace; 
            letter-spacing: -0.02em;
            transition: transform 0.15s ease-out;
        }
        #timer-time.changing {
            transform: scale(1.05);
        }
        #timer-status { margin-top: 4px; font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.15em; }
        #controls { display: flex; align-items: center; gap: 16px; }
        .ctrl { display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; transition: transform 0.15s ease-out; }
        .ctrl:active { transform: scale(0.88); }
        .ctrl.key-pressed { animation: btnPress 0.2s ease-out; }
        @keyframes btnPress {
            0% { transform: scale(1); }
            50% { transform: scale(0.85); }
            100% { transform: scale(1); }
        }
        .ctrl.small { width: 44px; height: 44px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.7); }
        .ctrl.small:active { background: rgba(255,255,255,0.15); }
        .ctrl.large { width: 60px; height: 60px; background: #fff; border: none; color: #1f2937; box-shadow: 0 8px 24px -6px rgba(0,0,0,0.4); }
        .ctrl.large:active { transform: scale(0.95); box-shadow: 0 4px 16px -4px rgba(0,0,0,0.3); }
        
        /* Responsive sizing using CSS variables - ENLARGED */
        :root {
            --ring-size: min(60vw, 60vh, 520px);
            --timer-font: min(18vw, 18vh, 120px);
            --btn-large: min(16vw, 16vh, 120px);
            --btn-small: min(12vw, 12vh, 88px);
            --badge-font: min(5vw, 5vh, 22px);
        }
        
        /* Desktop: horizontal layout */
        @media (min-width: 769px) {
            #content {
                flex-direction: row;
                justify-content: center;
                gap: 5vw;
                padding: 40px;
            }
            
            #timer-section {
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            
            #controls-section {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 24px;
            }
            
            #badge { 
                font-size: var(--badge-font); 
                padding: 8px 20px; 
                margin-bottom: 24px; 
            }
            
            #ring { 
                width: var(--ring-size); 
                height: var(--ring-size); 
                margin-bottom: 0;
            }
            
            #timer-time { font-size: var(--timer-font); }
            
            #timer-status { 
                font-size: min(2.5vw, 2.5vh, 16px); 
                margin-top: 8px;
            }
            
            .ctrl.large { 
                width: var(--btn-large); 
                height: var(--btn-large); 
            }
            
            .ctrl.small { 
                width: var(--btn-small); 
                height: var(--btn-small); 
            }
            
            #controls { 
                flex-direction: column;
                gap: 20px;
            }
        }
        
        /* Mobile: vertical layout - ENLARGED */
        @media (max-width: 768px) {
            :root {
                --ring-size: min(85vw, 420px);
                --timer-font: min(24vw, 96px);
                --btn-large: min(20vw, 90px);
                --btn-small: min(16vw, 72px);
                --badge-font: 16px;
            }
            
            /* Status and clock on same line for mobile */
            #app {
                position: relative;
            }
            
            #clock {
                display: flex;
                align-items: center;
                justify-content: center;
                height: 36px;
                padding: 0;
                border-radius: 18px;
                font-size: 14px;
                width: 80px;
            }
            
            #badge {
                display: flex;
                align-items: center;
                justify-content: center;
                height: 36px;
                padding: 0 12px;
                border-radius: 18px;
                font-size: 11px;
                margin-bottom: 0;
            }
            
            #clock-row {
                gap: 6px;
            }
            
            #timer-section {
                width: 100%;
            }
            
            #content {
                flex-direction: column;
                justify-content: center;
            }
            
            #ring { 
                width: var(--ring-size); 
                height: var(--ring-size); 
                margin-bottom: 24px;
            }
            
            #timer-time { font-size: var(--timer-font); }
            
            .ctrl.large { 
                width: var(--btn-large); 
                height: var(--btn-large); 
            }
            
            .ctrl.small { 
                width: var(--btn-small); 
                height: var(--btn-small); 
            }
            
            #controls { gap: 16px; }
            
            #timer-status { font-size: 11px; }
        }
        
        /* Settings Modal */
        #settings-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        
        #settings-modal.active {
            display: flex;
        }
        
        #settings-content {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        #settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        #settings-title {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
        }
        
        #settings-close {
            background: none;
            border: none;
            color: rgba(255,255,255,0.6);
            font-size: 24px;
            cursor: pointer;
            padding: 4px;
        }
        
        #settings-close:hover {
            color: #fff;
        }
        
        .settings-section {
            margin-bottom: 24px;
        }
        
        .settings-section-title {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255,255,255,0.8);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            gap: 12px;
        }
        
        .settings-label {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
        }
        
        .settings-input {
            width: 70px;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 14px;
            text-align: center;
        }
        
        .settings-input:focus {
            outline: none;
            border-color: rgba(59,130,246,0.5);
        }
        
        .settings-toggle {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        
        .toggle-switch {
            width: 44px;
            height: 24px;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            position: relative;
            transition: background 0.2s;
        }
        
        .toggle-switch.active {
            background: rgba(59,130,246,0.8);
        }
        
        .toggle-knob {
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: transform 0.2s;
        }
        
        .toggle-switch.active .toggle-knob {
            transform: translateX(20px);
        }
        
        .settings-credits {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            line-height: 1.6;
            text-align: center;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .settings-credits a {
            color: rgba(59,130,246,0.8);
            text-decoration: none;
        }
        
        .settings-credits a:hover {
            text-decoration: underline;
        }
        
        #settings-save {
            width: 100%;
            padding: 12px;
            background: rgba(59,130,246,0.8);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        
        #settings-save:hover {
            background: rgba(59,130,246,1);
        }
        
        .settings-reset-btn {
            width: 100%;
            padding: 10px;
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
            border-radius: 8px;
            color: rgba(239, 68, 68, 0.9);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .settings-reset-btn:hover {
            background: rgba(239, 68, 68, 0.3);
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="header">
            <div id="badge">Deep Work</div>
            <div id="clock-row">
                <div id="clock">00:00</div>
                <button id="settings-btn" aria-label="Settings">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                </button>
            </div>
        </div>
        <div id="content">
            <div id="timer-section">
                <div id="ring">
                    <svg viewBox="0 0 280 280">
                        <circle cx="140" cy="140" r="120" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="4"/>
                        <circle id="progress" cx="140" cy="140" r="120" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-dasharray="754" stroke-dashoffset="754"/>
                    </svg>
                    <div id="timer-text">
                        <div id="timer-time">25:00</div>
                        <div id="timer-status">Paused</div>
                    </div>
                </div>
            </div>
            <div id="controls-section">
                <div id="controls">
                    <button class="ctrl small" id="reset-btn" aria-label="Reset">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                            <path d="M3 3v5h5"/>
                        </svg>
                    </button>
                    <button class="ctrl large" id="play-btn" aria-label="Play">
                        <svg id="icon-play" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
                        <svg id="icon-pause" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                    </button>
                    <button class="ctrl small" id="mode-btn" aria-label="Switch Mode">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 3v18"/>
                            <path d="m9 18 3 3 3-3"/>
                            <path d="m9 6 3-3 3 3"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Settings Modal -->
    <div id="settings-modal">
        <div id="settings-content">
            <div id="settings-header">
                <div id="settings-title">Settings</div>
                <button id="settings-close">&times;</button>
            </div>
            
            <div class="settings-section">
                <div class="settings-section-title">Timer Durations</div>
                <div class="settings-row">
                    <span class="settings-label">Work (minutes)</span>
                    <input type="number" id="work-minutes" class="settings-input" value="25" min="1" max="120">
                </div>
                <div class="settings-row">
                    <span class="settings-label">Short Break (minutes)</span>
                    <input type="number" id="short-break-minutes" class="settings-input" value="5" min="1" max="60">
                </div>
                <div class="settings-row">
                    <span class="settings-label">Long Break (minutes)</span>
                    <input type="number" id="long-break-minutes" class="settings-input" value="15" min="1" max="120">
                </div>
            </div>
            
            <div class="settings-section">
                <div class="settings-section-title">Preferences</div>
                <div class="settings-row">
                    <span class="settings-label">Save state (cookies)</span>
                    <label class="settings-toggle" id="cookie-toggle">
                        <div class="toggle-switch active">
                            <div class="toggle-knob"></div>
                        </div>
                    </label>
                </div>
                <div class="settings-row">
                    <span class="settings-label">Sound on mode switch</span>
                    <label class="settings-toggle" id="sound-toggle">
                        <div class="toggle-switch active">
                            <div class="toggle-knob"></div>
                        </div>
                    </label>
                </div>
                <div class="settings-row">
                    <span class="settings-label">Vibrate on mode switch</span>
                    <label class="settings-toggle" id="vibrate-toggle">
                        <div class="toggle-switch active">
                            <div class="toggle-knob"></div>
                        </div>
                    </label>
                </div>
            </div>
            
            <div class="settings-section">
                <div class="settings-section-title">Data</div>
                <button id="settings-reset" class="settings-reset-btn">Reset All Settings</button>
            </div>
            
            <div class="settings-section">
                <div class="settings-credits">
                    <strong>Time & Flow</strong><br>
                    A Pomodoro timer by QQ<br>
                    With help from Nova ☄️<br><br>
                    Built with ❤️ using vanilla JS<br>
                    <a href="https://github.com/QQSHI13/flow" target="_blank">View on GitHub</a>
                </div>
            </div>
            
            <button id="settings-save">Save & Close</button>
        </div>
    </div>
    
    <script>
        // Settings
        let customWorkMinutes = 25;
        let customShortBreakMinutes = 5;
        let customLongBreakMinutes = 15;
        let cookiesEnabled = true;
        let soundEnabled = true;
        let vibrateEnabled = true;
        
        const settingsModal = document.getElementById('settings-modal');
        const settingsBtn = document.getElementById('settings-btn');
        const settingsClose = document.getElementById('settings-close');
        const settingsSave = document.getElementById('settings-save');
        const workMinutesInput = document.getElementById('work-minutes');
        const shortBreakMinutesInput = document.getElementById('short-break-minutes');
        const longBreakMinutesInput = document.getElementById('long-break-minutes');
        const cookieToggle = document.getElementById('cookie-toggle');
        const toggleSwitch = cookieToggle.querySelector('.toggle-switch');
        const soundToggle = document.getElementById('sound-toggle');
        const soundToggleSwitch = soundToggle.querySelector('.toggle-switch');
        const vibrateToggle = document.getElementById('vibrate-toggle');
        const vibrateToggleSwitch = vibrateToggle.querySelector('.toggle-switch');
        
        function openSettings() {
            workMinutesInput.value = customWorkMinutes;
            shortBreakMinutesInput.value = customShortBreakMinutes;
            longBreakMinutesInput.value = customLongBreakMinutes;
            if (cookiesEnabled) {
                toggleSwitch.classList.add('active');
            } else {
                toggleSwitch.classList.remove('active');
            }
            if (soundEnabled) {
                soundToggleSwitch.classList.add('active');
            } else {
                soundToggleSwitch.classList.remove('active');
            }
            if (vibrateEnabled) {
                vibrateToggleSwitch.classList.add('active');
            } else {
                vibrateToggleSwitch.classList.remove('active');
            }
            settingsModal.classList.add('active');
        }
        
        function closeSettings() {
            settingsModal.classList.remove('active');
        }
        
        function saveSettings() {
            customWorkMinutes = parseInt(workMinutesInput.value) || 25;
            customShortBreakMinutes = parseInt(shortBreakMinutesInput.value) || 5;
            customLongBreakMinutes = parseInt(longBreakMinutesInput.value) || 15;
            cookiesEnabled = toggleSwitch.classList.contains('active');
            soundEnabled = soundToggleSwitch.classList.contains('active');
            vibrateEnabled = vibrateToggleSwitch.classList.contains('active');
            
            // Save to cookie
            if (cookiesEnabled) {
                const settings = {
                    workMinutes: customWorkMinutes,
                    shortBreakMinutes: customShortBreakMinutes,
                    longBreakMinutes: customLongBreakMinutes,
                    cookiesEnabled: cookiesEnabled,
                    soundEnabled: soundEnabled,
                    vibrateEnabled: vibrateEnabled
                };
                setCookie('flowSettings', JSON.stringify(settings), 365);
            }
            
            // Update current timer if not running
            if (!isRunning) {
                if (mode === 'work') {
                    timeLeft = customWorkMinutes * 60;
                } else if (mode === 'shortBreak') {
                    timeLeft = customShortBreakMinutes * 60;
                } else {
                    timeLeft = customLongBreakMinutes * 60;
                }
                updateDisplay();
            }
            
            closeSettings();
        }
        
        function loadSettings() {
            const saved = getCookie('flowSettings');
            if (saved) {
                try {
                    const settings = JSON.parse(saved);
                    customWorkMinutes = settings.workMinutes || 25;
                    customShortBreakMinutes = settings.shortBreakMinutes || 5;
                    customLongBreakMinutes = settings.longBreakMinutes || 15;
                    cookiesEnabled = settings.cookiesEnabled !== false;
                    soundEnabled = settings.soundEnabled !== false;
                    vibrateEnabled = settings.vibrateEnabled !== false;
                } catch (e) {
                    console.log('Failed to load settings:', e);
                }
            }
        }
        
        settingsBtn.addEventListener('click', openSettings);
        settingsClose.addEventListener('click', closeSettings);
        settingsSave.addEventListener('click', saveSettings);
        
        // Reset button handler
        const settingsReset = document.getElementById('settings-reset');
        settingsReset.addEventListener('click', () => {
            if (confirm('Reset all settings to default? This will also clear saved state.')) {
                // Reset to defaults
                customWorkMinutes = 25;
                customShortBreakMinutes = 5;
                customLongBreakMinutes = 15;
                cookiesEnabled = true;
                soundEnabled = true;
                vibrateEnabled = true;
                
                // Clear cookies
                setCookie('flowSettings', '', -1);
                setCookie('flowState', '', -1);
                
                // Reset timer
                clearInterval(timerInterval);
                isRunning = false;
                mode = 'work';
                timeLeft = customWorkMinutes * 60;
                workSessionsCompleted = 0;
                
                // Update UI
                workMinutesInput.value = customWorkMinutes;
                shortBreakMinutesInput.value = customShortBreakMinutes;
                longBreakMinutesInput.value = customLongBreakMinutes;
                toggleSwitch.classList.add('active');
                soundToggleSwitch.classList.add('active');
                vibrateToggleSwitch.classList.add('active');
                updateDisplay();
                
                alert('Settings reset to defaults!');
            }
        });
        
        cookieToggle.addEventListener('click', () => {
            toggleSwitch.classList.toggle('active');
        });
        
        soundToggle.addEventListener('click', () => {
            soundToggleSwitch.classList.toggle('active');
        });
        
        vibrateToggle.addEventListener('click', () => {
            vibrateToggleSwitch.classList.toggle('active');
        });
        
        // Close modal when clicking outside
        settingsModal.addEventListener('click', (e) => {
            if (e.target === settingsModal) {
                closeSettings();
            }
        });
        
        // Config - use custom values
        const SESSIONS_BEFORE_LONG_BREAK = 4;
        
        // State (initialized with defaults, will be overwritten by loadState if saved state exists)
        let mode = 'work';
        let timeLeft = 25 * 60; // Default, will be updated after loading settings/state
        let isRunning = false;
        let timerInterval = null;
        let workSessionsCompleted = 0;
        
        // Load settings first
        loadSettings();
        
        // Set default timeLeft based on custom settings (will be overwritten by loadState if saved)
        timeLeft = customWorkMinutes * 60;
        
        // DOM refs
        const badge = document.getElementById('badge');
        const timerTime = document.getElementById('timer-time');
        const timerStatus = document.getElementById('timer-status');
        const progressCircle = document.getElementById('progress');
        const iconPlay = document.getElementById('icon-play');
        const iconPause = document.getElementById('icon-pause');
        
        // Format seconds to MM:SS
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
        }
        
        // Update UI
        function updateDisplay() {
            let totalTime;
            if (mode === 'work') {
                totalTime = customWorkMinutes * 60;
            } else if (mode === 'shortBreak') {
                totalTime = customShortBreakMinutes * 60;
            } else {
                totalTime = customLongBreakMinutes * 60;
            }
            
            const progress = ((totalTime - timeLeft) / totalTime) * 100;
            const circumference = 2 * Math.PI * 120;
            const offset = circumference - (progress / 100) * circumference;
            
            // Update timer with animation
            const timeString = formatTime(timeLeft);
            if (timerTime.textContent !== timeString) {
                timerTime.classList.add('changing');
                timerTime.textContent = timeString;
                setTimeout(() => timerTime.classList.remove('changing'), 150);
            }
            
            if (isRunning) {
                if (mode === 'work') {
                    timerStatus.textContent = 'Focusing...';
                } else if (mode === 'shortBreak') {
                    timerStatus.textContent = 'Short Break';
                } else {
                    timerStatus.textContent = 'Long Break';
                }
            } else {
                timerStatus.textContent = 'Paused';
            }
            
            if (mode === 'work') {
                if (isRunning) {
                    badge.textContent = `Deep Work ${workSessionsCompleted % SESSIONS_BEFORE_LONG_BREAK + 1}/${SESSIONS_BEFORE_LONG_BREAK}`;
                } else {
                    badge.textContent = 'Deep Work';
                }
            } else if (mode === 'shortBreak') {
                badge.textContent = 'Short Rest';
            } else {
                badge.textContent = 'Long Rest';
            }
            
            progressCircle.style.strokeDashoffset = offset;
            iconPlay.style.display = isRunning ? 'none' : 'block';
            iconPause.style.display = isRunning ? 'block' : 'none';
        }
        
        // Sound effect for mode switch
        function playModeSwitchSound(soundType = 'default') {
            if (!soundEnabled) return;
            
            // Vibrate on mobile (200ms pattern)
            if (vibrateEnabled && 'vibrate' in navigator) {
                navigator.vibrate([200, 100, 200]);
            }
            
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            // Different sounds for different events
            if (soundType === 'workEnd') {
                // Work finished - triumphant ascending major chord (C5-E5-G5)
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                oscillator.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.15); // E5
                oscillator.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.3); // G5
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.8);
            } else if (soundType === 'breakEnd') {
                // Break finished - gentle descending pattern (G5-E5-C5)
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(783.99, audioCtx.currentTime); // G5
                oscillator.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.15); // E5
                oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime + 0.3); // C5
                gainNode.gain.setValueAtTime(0.25, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.8);
            } else {
                // Default/manual switch - original pleasant chime
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                oscillator.frequency.exponentialRampToValueAtTime(1046.5, audioCtx.currentTime + 0.1); // C6
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.5);
            }
        }
        
        // Wake Lock to prevent screen from sleeping
        let wakeLock = null;
        
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    wakeLock.addEventListener('release', () => {
                        console.log('Wake Lock released');
                    });
                } catch (err) {
                    console.log('Wake Lock failed:', err);
                }
            }
        }
        
        function releaseWakeLock() {
            if (wakeLock) {
                wakeLock.release();
                wakeLock = null;
            }
        }
        
        // Toggle timer
        function toggle() {
            if (isRunning) {
                clearInterval(timerInterval);
                isRunning = false;
                saveState();
                releaseWakeLock(); // Release wake lock when paused
                // Exit fullscreen when paused
                if (document.exitFullscreen) {
                    document.exitFullscreen().catch(err => console.log('Exit fullscreen failed'));
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                }
            } else {
                isRunning = true;
                saveState();
                requestWakeLock(); // Request wake lock when starting
                // Enter fullscreen when started (only on desktop)
                if (window.innerWidth > 768) {
                    const elem = document.documentElement;
                    if (elem.requestFullscreen) {
                        elem.requestFullscreen().catch(err => console.log('Fullscreen not allowed'));
                    } else if (elem.webkitRequestFullscreen) {
                        elem.webkitRequestFullscreen();
                    }
                }
                timerInterval = setInterval(() => {
                    if (timeLeft <= 1) {
                        // Determine sound type before switching mode
                        const soundType = mode === 'work' ? 'workEnd' : 'breakEnd';
                        playModeSwitchSound(soundType);
                        
                        // Auto-switch mode based on Pomodoro logic
                        if (mode === 'work') {
                            workSessionsCompleted++;
                            if (workSessionsCompleted % SESSIONS_BEFORE_LONG_BREAK === 0) {
                                mode = 'longBreak';
                                timeLeft = customLongBreakMinutes * 60;
                            } else {
                                mode = 'shortBreak';
                                timeLeft = customShortBreakMinutes * 60;
                            }
                        } else {
                            // After any break, go back to work
                            mode = 'work';
                            timeLeft = customWorkMinutes * 60;
                        }
                        // Keep timer running - don't clearInterval or set isRunning=false
                    } else {
                        timeLeft--;
                    }
                    updateDisplay();
                    saveState();
                }, 1000);
            }
            updateDisplay();
        }
        
        // Reset timer
        function reset() {
            clearInterval(timerInterval);
            isRunning = false;
            releaseWakeLock();
            if (mode === 'work') {
                timeLeft = customWorkMinutes * 60;
            } else if (mode === 'shortBreak') {
                timeLeft = customShortBreakMinutes * 60;
            } else {
                timeLeft = customLongBreakMinutes * 60;
            }
            saveState();
            updateDisplay();
        }
        
        // Switch mode manually (cycles through: work -> shortBreak -> longBreak -> work)
        function switchMode() {
            clearInterval(timerInterval);
            isRunning = false;
            releaseWakeLock();
            playModeSwitchSound(); // Play sound on manual switch
            if (mode === 'work') {
                mode = 'shortBreak';
                timeLeft = customShortBreakMinutes * 60;
            } else if (mode === 'shortBreak') {
                mode = 'longBreak';
                timeLeft = customLongBreakMinutes * 60;
            } else {
                mode = 'work';
                timeLeft = customWorkMinutes * 60;
            }
            saveState();
            updateDisplay();
        }
        
        // Event listeners
        const playBtn = document.getElementById('play-btn');
        const resetBtn = document.getElementById('reset-btn');
        const modeBtn = document.getElementById('mode-btn');
        
        playBtn.addEventListener('click', toggle);
        resetBtn.addEventListener('click', reset);
        modeBtn.addEventListener('click', switchMode);
        
        // Helper to animate button press
        function animateButton(btn) {
            btn.classList.remove('key-pressed');
            void btn.offsetWidth; // Force reflow
            btn.classList.add('key-pressed');
            setTimeout(() => btn.classList.remove('key-pressed'), 300);
        }
        
        // Keyboard shortcuts
        // R = if running: reset; if paused: switch mode
        document.addEventListener('keydown', e => {
            // Skip if Ctrl or Cmd is pressed (let browser handle shortcuts like Ctrl+R)
            if (e.ctrlKey || e.metaKey) return;
            
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            
            // Space = Play/Pause
            if (e.code === 'Space' || e.key === ' ') {
                e.preventDefault();
                toggle();
                animateButton(playBtn);
                return;
            }
            
            // R = if running: reset; if paused: switch mode
            if (e.key === 'r' || e.key === 'R') {
                if (isRunning) {
                    reset();
                    animateButton(resetBtn);
                } else {
                    switchMode();
                    animateButton(modeBtn);
                }
                return;
            }
        });
        
        // Cookie functions
        function setCookie(name, value, days) {
            const expires = new Date();
            expires.setTime(expires.getTime() + days * 24 * 60 * 60 * 1000);
            document.cookie = `${name}=${encodeURIComponent(value)};expires=${expires.toUTCString()};path=/`;
        }
        
        function getCookie(name) {
            const nameEQ = name + "=";
            const ca = document.cookie.split(';');
            for (let i = 0; i < ca.length; i++) {
                let c = ca[i].trim();
                if (c.indexOf(nameEQ) === 0) {
                    return decodeURIComponent(c.substring(nameEQ.length));
                }
            }
            return null;
        }
        
        // Save state to cookie
        function saveState() {
            if (!cookiesEnabled) return;
            const state = {
                mode: mode,
                timeLeft: timeLeft,
                isRunning: isRunning,
                workSessionsCompleted: workSessionsCompleted,
                timestamp: Date.now()
            };
            setCookie('flowState', JSON.stringify(state), 30);
        }
        
        // Load state from cookie
        function loadState() {
            const saved = getCookie('flowState');
            if (!saved) return false;
            
            try {
                const state = JSON.parse(saved);
                const now = Date.now();
                const elapsed = Math.floor((now - state.timestamp) / 1000);
                
                mode = state.mode || 'work';
                workSessionsCompleted = state.workSessionsCompleted || 0;
                
                // Calculate remaining time
                if (state.isRunning) {
                    // Timer was running when saved - subtract elapsed time
                    timeLeft = Math.max(0, state.timeLeft - elapsed);
                    
                    // If timer expired while away, switch modes
                    if (timeLeft <= 0) {
                        // Auto-switch based on what mode we were in
                        if (mode === 'work') {
                            workSessionsCompleted++;
                            if (workSessionsCompleted % SESSIONS_BEFORE_LONG_BREAK === 0) {
                                mode = 'longBreak';
                                timeLeft = customLongBreakMinutes * 60;
                            } else {
                                mode = 'shortBreak';
                                timeLeft = customShortBreakMinutes * 60;
                            }
                        } else {
                            mode = 'work';
                            timeLeft = customWorkMinutes * 60;
                        }
                        isRunning = false; // Stop when returning after timer expired
                    } else {
                        isRunning = true; // Resume running
                    }
                } else {
                    // Timer was paused - keep same time
                    timeLeft = state.timeLeft;
                    isRunning = false;
                }
                
                return true;
            } catch (e) {
                console.log('Failed to load state:', e);
                return false;
            }
        }
        
        // Save state before page unload
        window.addEventListener('beforeunload', saveState);
        
        // Also save periodically while running
        setInterval(() => {
            if (isRunning && cookiesEnabled) saveState();
        }, 10000); // Save every 10 seconds while running
        
        // Clock
        const clock = document.getElementById('clock');
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            clock.textContent = `${h}:${m}`;
        }
        updateClock();
        setInterval(updateClock, 1000);
        
        // Init - load saved state if available
        const stateLoaded = loadState();
        if (!stateLoaded) {
            // No saved state, use defaults based on custom settings
            timeLeft = customWorkMinutes * 60;
        }
        updateDisplay();
        
        // If timer was running when saved, restart the interval
        if (isRunning) {
            timerInterval = setInterval(() => {
                if (timeLeft <= 1) {
                    if (mode === 'work') {
                        workSessionsCompleted++;
                        if (workSessionsCompleted % SESSIONS_BEFORE_LONG_BREAK === 0) {
                            mode = 'longBreak';
                            timeLeft = customLongBreakMinutes * 60;
                        } else {
                            mode = 'shortBreak';
                            timeLeft = customShortBreakMinutes * 60;
                        }
                    } else {
                        mode = 'work';
                        timeLeft = customWorkMinutes * 60;
                    }
                } else {
                    timeLeft--;
                }
                updateDisplay();
                saveState();
            }, 1000);
            // Save state immediately on load to ensure it's fresh
            saveState();
        }
    </script>
</body>
