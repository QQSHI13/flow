<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Time & Flow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: rgb(17, 18, 19); }
        #container { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        
        /* View Toggle */
        #view-toggle { position: absolute; top: 20px; right: 20px; display: flex; gap: 8px; z-index: 100; }
        .view-btn { padding: 8px 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); font-size: 12px; cursor: pointer; transition: all 200ms; }
        .view-btn:hover { background: rgba(255,255,255,0.15); color: white; }
        .view-btn.active { background: rgba(59,130,246,0.5); border-color: rgba(59,130,246,0.5); color: white; }
        
        /* Settings Button */
        #settings-btn { position: absolute; top: 20px; left: 20px; width: 40px; height: 40px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 200ms; z-index: 100; }
        #settings-btn:hover { background: rgba(255,255,255,0.15); color: white; }
        
        /* Settings Panel */
        #settings-panel { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; }
        #settings-panel.open { display: flex; }
        #settings-content { background: rgb(30, 30, 35); border-radius: 16px; padding: 24px; width: 90%; max-width: 400px; max-height: 80vh; overflow-y: auto; }
        #settings-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        #settings-header h2 { color: white; font-size: 20px; font-weight: 500; margin: 0; }
        #close-settings { background: none; border: none; color: rgba(255,255,255,0.5); font-size: 24px; cursor: pointer; }
        #close-settings:hover { color: white; }
        
        .setting-item { margin-bottom: 20px; }
        .setting-label { display: block; color: rgba(255,255,255,0.7); font-size: 14px; margin-bottom: 8px; }
        .setting-input { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white; font-size: 14px; }
        .setting-input:focus { outline: none; border-color: rgba(59,130,246,0.5); }
        
        .toggle-row { display: flex; align-items: center; justify-content: space-between; }
        .toggle-switch { position: relative; width: 48px; height: 24px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.2); transition: 300ms; border-radius: 24px; }
        .toggle-slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background: white; transition: 300ms; border-radius: 50%; }
        input:checked + .toggle-slider { background: rgba(59,130,246,0.8); }
        input:checked + .toggle-slider:before { transform: translateX(24px); }
        
        .save-btn { width: 100%; padding: 12px; border-radius: 8px; border: none; background: rgba(59,130,246,0.8); color: white; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 200ms; }
        .save-btn:hover { background: rgba(59,130,246,1); }
        
        /* Views */
        #clock-view, #flow-view { width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #clock-view { display: none; }
        #clock-view.active { display: flex; }
        #flow-view { display: none; }
        #flow-view.active { display: flex; }
        
        /* Digital Clock */
        #digital-time { padding: 20px 40px; border: 1px solid #69696962; border-radius: 50px; font: normal 1500%/normal Arial, Helvetica, sans-serif; color: rgba(255, 255, 255, 0.9); letter-spacing: 1px; background: rgba(96, 96, 96, 0.36); box-shadow: 7px 7px 11px 0 rgba(0, 0, 0, 0.46); text-shadow: 5px 5px 11px rgba(0, 0, 0, 0.64); transition: all 300ms cubic-bezier(0.42, 0, 0.58, 1); }
        
        /* Flow Pomodoro */
        #mode-indicator { padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 500; color: rgba(255, 255, 255, 0.9); text-transform: uppercase; letter-spacing: 0.1em; background: rgba(59, 130, 246, 0.3); }
        #flow-timer { position: relative; width: 200px; height: 200px; margin: 15px 0; }
        #flow-timer svg { width: 100%; height: 100%; transform: rotate(-90deg); }
        #timer-display { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #time-text { font-size: 48px; font-weight: 300; color: white; font-family: ui-monospace, SFMono-Regular, monospace; letter-spacing: -0.02em; }
        #time-status { margin-top: 4px; font-size: 11px; font-weight: 500; color: rgba(255, 255, 255, 0.5); text-transform: uppercase; letter-spacing: 0.15em; }
        #controls { display: flex; align-items: center; gap: 12px; margin-top: 10px; }
        .control-btn { display: flex; align-items: center; justify-content: center; border-radius: 50%; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: rgba(255, 255, 255, 0.7); cursor: pointer; transition: all 200ms ease; outline: none; }
        .control-btn:hover { background: rgba(255, 255, 255, 0.15); border-color: rgba(255, 255, 255, 0.4); color: white; }
        .control-btn:focus { box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.5); }
        .control-btn.small { width: 40px; height: 40px; }
        .control-btn.large { width: 56px; height: 56px; background: white; border: none; color: #1f2937; box-shadow: 0 8px 24px -6px rgba(0, 0, 0, 0.4); }
        .control-btn.large:hover { background: white; transform: scale(1.05); box-shadow: 0 12px 32px -6px rgba(0, 0, 0, 0.5); }
        
        /* Responsive */
        @media (max-width: 768px) {
            #digital-time { padding: 15px 30px; font-size: 800%; }
            #flow-timer { width: 160px; height: 160px; }
            #time-text { font-size: 36px; }
            .control-btn.small { width: 44px; height: 44px; }
            .control-btn.large { width: 60px; height: 60px; }
        }
    </style>
</head>
<body>
    <!-- Settings Button -->
    <button id="settings-btn" aria-label="Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 1v6m0 6v6m4.22-10.22l4.24-4.24M6.34 6.34L2.1 2.1m17.8 17.8l-4.24-4.24M6.34 17.66l-4.24 4.24M23 12h-6m-6 0H1m20.07-4.93l-4.24 4.24M6.34 6.34l-4.24-4.24"/>
        </svg>
    </button>
    
    <!-- View Toggle -->
    <div id="view-toggle">
        <button class="view-btn" data-view="clock">Clock</button>
        <button class="view-btn active" data-view="flow">Flow</button>
    </div>
    
    <!-- Settings Panel -->
    <div id="settings-panel">
        <div id="settings-content">
            <div id="settings-header">
                <h2>Settings</h2>
                <button id="close-settings">&times;</button>
            </div>
            
            <div class="setting-item">
                <div class="toggle-row">
                    <span class="setting-label">Sound Notifications</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="sound-toggle" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>
            
            <div class="setting-item">
                <label class="setting-label">Work Duration (minutes)</label>
                <input type="number" class="setting-input" id="work-duration" value="25" min="1" max="60">
            </div>
            
            <div class="setting-item">
                <label class="setting-label">Break Duration (minutes)</label>
                <input type="number" class="setting-input" id="break-duration" value="5" min="1" max="30">
            </div>
            
            <button class="save-btn" id="save-settings">Save Settings</button>
        </div>
    </div>

    <div id="container">
        <!-- Clock View -->
        <div id="clock-view">
            <div id="digital-time">00:00:00</div>
        </div>
        
        <!-- Flow View -->
        <div id="flow-view" class="active">
            <div id="mode-indicator">Deep Work</div>
            
            <div id="flow-timer">
                <svg viewBox="0 0 280 280">
                    <circle cx="140" cy="140" r="120" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="4"/>
                    <circle id="progress-circle" cx="140" cy="140" r="120" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-dasharray="754" stroke-dashoffset="754"/>
                </svg>
                <div id="timer-display">
                    <div id="time-text">25:00</div>
                    <div id="time-status">Paused</div>
                </div>
            </div>
            
            <div id="controls">
                <button class="control-btn small" id="reset-btn" aria-label="Reset timer">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 12"/>
                        <path d="M3 3v9h9"/>
                    </svg>
                </button>
                
                <button class="control-btn large" id="play-btn" aria-label="Start timer">
                    <svg id="play-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="margin-left: 3px;">
                        <polygon points="5,3 19,12 5,21"/>
                    </svg>
                    <svg id="pause-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display: none;">
                        <rect x="6" y="4" width="4" height="16"/>
                        <rect x="14" y="4" width="4" height="16"/>
                    </svg>
                </button>
                
                <button class="control-btn small" id="mode-btn" aria-label="Switch mode">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M8 3H5a2 2 0 0 0-2 2v3"/>
                        <path d="M21 8V5a2 2 0 0 0-2-2h-3"/>
                        <path d="M3 16v3a2 2 0 0 0 2 2h3"/>
                        <path d="M16 21h3a2 2 0 0 0 2-2v-3"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
    
    <script>
        // Settings
        const settings = {
            soundEnabled: true,
            workDuration: 25,
            breakDuration: 5,
            currentView: 'flow' // 'clock' or 'flow'
        };
        
        // Audio context for sound
        let audioContext = null;
        
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        
        function playNotificationSound() {
            if (!settings.soundEnabled || !audioContext) return;
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime); // C5
            oscillator.frequency.setValueAtTime(659.25, audioContext.currentTime + 0.1); // E5
            oscillator.frequency.setValueAtTime(783.99, audioContext.currentTime + 0.2); // G5
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        }
        
        // Digital Clock
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('digital-time').textContent = `${hours}:${minutes}:${seconds}`;
        }
        setInterval(updateClock, 1000);
        updateClock();
        
        // Flow Pomodoro Timer
        let WORK_TIME = settings.workDuration * 60;
        let BREAK_TIME = settings.breakDuration * 60;
        let mode = 'work';
        let timeLeft = WORK_TIME;
        let isRunning = false;
        let interval = null;
        let rKeyState = 0; // 0 = reset, 1 = switch mode
        
        const modeIndicator = document.getElementById('mode-indicator');
        const timeText = document.getElementById('time-text');
        const timeStatus = document.getElementById('time-status');
        const progressCircle = document.getElementById('progress-circle');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const playBtn = document.getElementById('play-btn');
        
        const circumference = 2 * Math.PI * 120;
        progressCircle.style.strokeDasharray = circumference;
        
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }
        
        function updateDisplay() {
            const totalTime = mode === 'work' ? WORK_TIME : BREAK_TIME;
            const progress = ((totalTime - timeLeft) / totalTime) * 100;
            const strokeDashoffset = circumference - (progress / 100) * circumference;
            
            timeText.textContent = formatTime(timeLeft);
            timeStatus.textContent = isRunning ? (mode === 'work' ? 'Focusing...' : 'Recharging...') : 'Paused';
            modeIndicator.textContent = mode === 'work' ? 'Deep Work' : 'Rest & Recover';
            progressCircle.style.strokeDashoffset = strokeDashoffset;
            
            if (isRunning) {
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
                playBtn.setAttribute('aria-label', 'Pause timer');
            } else {
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
                playBtn.setAttribute('aria-label', 'Start timer');
            }
        }
        
        function toggleTimer() {
            initAudio();
            if (isRunning) {
                clearInterval(interval);
                isRunning = false;
            } else {
                isRunning = true;
                interval = setInterval(() => {
                    if (timeLeft <= 1) {
                        clearInterval(interval);
                        isRunning = false;
                        playNotificationSound();
                        mode = mode === 'work' ? 'break' : 'work';
                        timeLeft = mode === 'work' ? WORK_TIME : BREAK_TIME;
                    } else {
                        timeLeft--;
                    }
                    updateDisplay();
                }, 1000);
            }
            updateDisplay();
        }
        
        function resetTimer() {
            initAudio();
            clearInterval(interval);
            isRunning = false;
            timeLeft = mode === 'work' ? WORK_TIME : BREAK_TIME;
            updateDisplay();
        }
        
        function switchMode() {
            initAudio();
            clearInterval(interval);
            isRunning = false;
            mode = mode === 'work' ? 'break' : 'work';
            timeLeft = mode === 'work' ? WORK_TIME : BREAK_TIME;
            updateDisplay();
        }
        
        // View switching
        const clockViewBtn = document.querySelector('[data-view="clock"]');
        const flowViewBtn = document.querySelector('[data-view="flow"]');
        const clockView = document.getElementById('clock-view');
        const flowView = document.getElementById('flow-view');
        
        function showView(viewName) {
            settings.currentView = viewName;
            if (viewName === 'clock') {
                clockView.classList.add('active');
                flowView.classList.remove('active');
                clockViewBtn.classList.add('active');
                flowViewBtn.classList.remove('active');
            } else {
                clockView.classList.remove('active');
                flowView.classList.add('active');
                clockViewBtn.classList.remove('active');
                flowViewBtn.classList.add('active');
            }
        }
        
        clockViewBtn.addEventListener('click', () => showView('clock'));
        flowViewBtn.addEventListener('click', () => showView('flow'));
        
        // Event listeners
        document.getElementById('reset-btn').addEventListener('click', resetTimer);
        document.getElementById('play-btn').addEventListener('click', toggleTimer);
        document.getElementById('mode-btn').addEventListener('click', switchMode);
        
        // Settings panel
        const settingsBtn = document.getElementById('settings-btn');
        const settingsPanel = document.getElementById('settings-panel');
        const closeSettings = document.getElementById('close-settings');
        const saveSettings = document.getElementById('save-settings');
        const soundToggle = document.getElementById('sound-toggle');
        const workDurationInput = document.getElementById('work-duration');
        const breakDurationInput = document.getElementById('break-duration');
        
        settingsBtn.addEventListener('click', () => {
            settingsPanel.classList.add('open');
        });
        
        closeSettings.addEventListener('click', () => {
            settingsPanel.classList.remove('open');
        });
        
        settingsPanel.addEventListener('click', (e) => {
            if (e.target === settingsPanel) {
                settingsPanel.classList.remove('open');
            }
        });
        
        saveSettings.addEventListener('click', () => {
            settings.soundEnabled = soundToggle.checked;
            settings.workDuration = parseInt(workDurationInput.value) || 25;
            settings.breakDuration = parseInt(breakDurationInput.value) || 5;
            
            WORK_TIME = settings.workDuration * 60;
            BREAK_TIME = settings.breakDuration * 60;
            
            // Reset timer with new durations
            if (!isRunning) {
                timeLeft = mode === 'work' ? WORK_TIME : BREAK_TIME;
                updateDisplay();
            }
            
            settingsPanel.classList.remove('open');
        });
        
        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            
            if (e.code === 'Space') {
                e.preventDefault();
                if (showFlow && settings.currentView === 'flow') toggleTimer();
            } else if (e.key === 'r' || e.key === 'R') {
                // R cycles: reset timer -> switch mode
                if (rKeyState === 0) {
                    resetTimer();
                    rKeyState = 1;
                } else {
                    switchMode();
                    rKeyState = 0;
                }
            } else if (e.key === 'm' || e.key === 'M') {
                // M toggles between clock and flow views
                showFlow = !showFlow;
                showView(showFlow ? 'flow' : 'clock');
            }
        });
        
        // Initialize
        showView('flow');
        updateDisplay();
    </script>
</body>
</html>
