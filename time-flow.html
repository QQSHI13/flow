<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Time & Flow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: rgb(17, 18, 19);
        }
        
        #container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        
        /* Digital Clock Display */
        #digital-time {
            padding: 20px 40px;
            border: 1px solid #69696962;
            border-radius: 50px;
            font: normal 1500%/normal Arial, Helvetica, sans-serif;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 1px;
            background: rgba(96, 96, 96, 0.36);
            box-shadow: 7px 7px 11px 0 rgba(0, 0, 0, 0.46);
            text-shadow: 5px 5px 11px rgba(0, 0, 0, 0.64);
            transition: all 300ms cubic-bezier(0.42, 0, 0.58, 1);
        }
        
        /* Flow Pomodoro Timer */
        #flow-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        
        #mode-indicator {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            background: rgba(59, 130, 246, 0.3);
        }
        
        #flow-timer {
            position: relative;
            width: 200px;
            height: 200px;
        }
        
        #flow-timer svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }
        
        #timer-display {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        #time-text {
            font-size: 48px;
            font-weight: 300;
            color: white;
            font-family: ui-monospace, SFMono-Regular, monospace;
            letter-spacing: -0.02em;
        }
        
        #time-status {
            margin-top: 4px;
            font-size: 11px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }
        
        /* Controls */
        #controls {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 10px;
        }
        
        .control-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: all 200ms ease;
            outline: none;
        }
        
        .control-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            color: white;
        }
        
        .control-btn:focus {
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.5);
        }
        
        .control-btn.small {
            width: 40px;
            height: 40px;
        }
        
        .control-btn.large {
            width: 56px;
            height: 56px;
            background: white;
            border: none;
            color: #1f2937;
            box-shadow: 0 8px 24px -6px rgba(0, 0, 0, 0.4);
        }
        
        .control-btn.large:hover {
            background: white;
            transform: scale(1.05);
            box-shadow: 0 12px 32px -6px rgba(0, 0, 0, 0.5);
        }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            #digital-time {
                padding: 15px 30px;
                font-size: 800%;
            }
            
            #flow-timer {
                width: 160px;
                height: 160px;
            }
            
            #time-text {
                font-size: 36px;
            }
            
            .control-btn.small {
                width: 44px;
                height: 44px;
            }
            
            .control-btn.large {
                width: 60px;
                height: 60px;
            }
            
            #container {
                gap: 15px;
            }
        }
        
        @media (max-width: 480px) {
            #digital-time {
                padding: 12px 24px;
                font-size: 600%;
            }
            
            #flow-timer {
                width: 140px;
                height: 140px;
            }
            
            #time-text {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <div id="container">
        <!-- Digital Clock -->
        <div id="digital-time">00:00:00</div>
        
        <!-- Flow Pomodoro Timer -->
        <div id="flow-container">
            <div id="mode-indicator">Deep Work</div>
            
            <div id="flow-timer">
                <svg viewBox="0 0 280 280">
                    <circle cx="140" cy="140" r="120" fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth="4"/>
                    <circle id="progress-circle" cx="140" cy="140" r="120" fill="none" stroke="white" strokeWidth="4" strokeLinecap="round" strokeDasharray="754" strokeDashoffset="754"/>
                </svg>
                <div id="timer-display">
                    <div id="time-text">25:00</div>
                    <div id="time-status">Paused</div>
                </div>
            </div>
            
            <!-- Controls -->
            <div id="controls">
                <button class="control-btn small" id="reset-btn" aria-label="Reset timer">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 12"/>
                        <path d="M3 3v9h9"/>
                    </svg>
                </button>
                
                <button class="control-btn large" id="play-btn" aria-label="Start timer">
                    <svg id="play-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style={{ marginLeft: '3px' }}>
                        <polygon points="5,3 19,12 5,21"/>
                    </svg>
                    <svg id="pause-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style={{ display: 'none' }}>
                        <rect x="6" y="4" width="4" height="16"/>
                        <rect x="14" y="4" width="4" height="16"/>
                    </svg>
                </button>
                
                <button class="control-btn small" id="mode-btn" aria-label="Switch mode">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                        <path d="M8 3H5a2 2 0 0 0-2 2v3"/>
                        <path d="M21 8V5a2 2 0 0 0-2-2h-3"/>
                        <path d="M3 16v3a2 2 0 0 0 2 2h3"/>
                        <path d="M16 21h3a2 2 0 0 0 2-2v-3"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
    
    <script>
        // Digital Clock
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('digital-time').textContent = `${hours}:${minutes}:${seconds}`;
        }
        setInterval(updateClock, 1000);
        updateClock();
        
        // Flow Pomodoro Timer
        const WORK_TIME = 25 * 60;
        const BREAK_TIME = 5 * 60;
        
        let mode = 'work';
        let timeLeft = WORK_TIME;
        let isRunning = false;
        let interval = null;
        
        const modeIndicator = document.getElementById('mode-indicator');
        const timeText = document.getElementById('time-text');
        const timeStatus = document.getElementById('time-status');
        const progressCircle = document.getElementById('progress-circle');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const playBtn = document.getElementById('play-btn');
        
        const circumference = 2 * Math.PI * 120;
        progressCircle.style.strokeDasharray = circumference;
        
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }
        
        function updateDisplay() {
            const totalTime = mode === 'work' ? WORK_TIME : BREAK_TIME;
            const progress = ((totalTime - timeLeft) / totalTime) * 100;
            const strokeDashoffset = circumference - (progress / 100) * circumference;
            
            timeText.textContent = formatTime(timeLeft);
            timeStatus.textContent = isRunning ? (mode === 'work' ? 'Focusing...' : 'Recharging...') : 'Paused';
            modeIndicator.textContent = mode === 'work' ? 'Deep Work' : 'Rest & Recover';
            progressCircle.style.strokeDashoffset = strokeDashoffset;
            
            if (isRunning) {
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
                playBtn.setAttribute('aria-label', 'Pause timer');
            } else {
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
                playBtn.setAttribute('aria-label', 'Start timer');
            }
        }
        
        function toggleTimer() {
            if (isRunning) {
                clearInterval(interval);
                isRunning = false;
            } else {
                isRunning = true;
                interval = setInterval(() => {
                    if (timeLeft <= 1) {
                        clearInterval(interval);
                        isRunning = false;
                        mode = mode === 'work' ? 'break' : 'work';
                        timeLeft = mode === 'work' ? WORK_TIME : BREAK_TIME;
                    } else {
                        timeLeft--;
                    }
                    updateDisplay();
                }, 1000);
            }
            updateDisplay();
        }
        
        function resetTimer() {
            clearInterval(interval);
            isRunning = false;
            timeLeft = mode === 'work' ? WORK_TIME : BREAK_TIME;
            updateDisplay();
        }
        
        function switchMode() {
            clearInterval(interval);
            isRunning = false;
            mode = mode === 'work' ? 'break' : 'work';
            timeLeft = mode === 'work' ? WORK_TIME : BREAK_TIME;
            updateDisplay();
        }
        
        // Event listeners
        document.getElementById('reset-btn').addEventListener('click', resetTimer);
        document.getElementById('play-btn').addEventListener('click', toggleTimer);
        document.getElementById('mode-btn').addEventListener('click', switchMode);
        
        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            
            if (e.code === 'Space') {
                e.preventDefault();
                toggleTimer();
            } else if (e.key === 'r' || e.key === 'R') {
                resetTimer();
            } else if (e.key === 'm' || e.key === 'M') {
                switchMode();
            }
        });
        
        // Initialize
        updateDisplay();
    </script>
</body>
</html>
